    <!-- 作品展示区 -->
    <div class="works-container">
        <div class="works-counter" id="worksCounter"></div>
        <div class="works-carousel" id="worksCarousel">
            <!-- 作品1 -->

                <div style="height: 500px; width: 300px;gap: 200px; display: flex;">

            </div>

                <img src="img/painting5.jpg" style="width: 900px;height:500px;">

<script src="js/jquery-3.2.1.min.js"></script>
<script src="js/bootstrap.min.js"></script>
<script src="js/main.js"></script>

<script>
    let currentIndex = 0;
    const totalWorks = 3; 

    // 更新显示
    function updateDisplay() {
        // 隐藏所有作品
        $('.works-slide').removeClass('active');
        // 显示当前作品
        $('.works-slide').eq(currentIndex).addClass('active');
        // 更新指示器高亮
        updateCounter();
    }

    // 更新作品序号指示器
    function updateCounter() {
        var html = '';
        for (var i = 0; i < totalWorks; i++) {
            const isActive = (i === currentIndex);
            html += `
                <div class="counter-item ${isActive ? 'active' : ''}" onclick="goToWork(${i})" style="font-family:宋体">
                    <h4>作品${i + 1}</h4>
                </div>
            `;
        }
        $('#worksCounter').html(html);
    }



    // 直接跳转到指定作品
    function goToWork(index) {
        currentIndex = index;
        updateDisplay();
    }


    // 页面加载完成
    $(document).ready(function() {
        updateDisplay();
    });
</script>

</body>
